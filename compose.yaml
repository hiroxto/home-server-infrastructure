services:
  mirakurun:
    image: ghcr.io/hiroxto/mirakurun:latest@sha256:7be9dd5558cd4568379729784a15042aef8b724f82ec76387075360b9ce979c7
    cap_add:
      - SYS_ADMIN
      - SYS_NICE
    environment:
      TZ: Asia/Tokyo
      DOCKER_NETWORK: host
      # LOG_LEVEL: "3"
      # DEBUG: "true"
    network_mode: host
    ports:
      - 40772:40772
      - 9229:9229
    devices:
      - /dev/bus:/dev/bus
      - /dev/px4video0:/dev/px4video0
      - /dev/px4video1:/dev/px4video1
      - /dev/px4video2:/dev/px4video2
      - /dev/px4video3:/dev/px4video3
      - /dev/px4video4:/dev/px4video4
      - /dev/px4video5:/dev/px4video5
      - /dev/px4video6:/dev/px4video6
      - /dev/px4video7:/dev/px4video7
    volumes:
      - ./mirakurun/extra:/extra:cached
      - ./mirakurun/conf:/app-config
      - ./mirakurun/data:/app-data
    restart: always
    logging:
      driver: json-file
      options:
        max-file: "1"
        max-size: 10m

  nginx:
    image: nginx:1.30.0
    network_mode: host
    ports:
      - 8080:8080
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:cached
    restart: always
    logging:
      driver: json-file
      options:
        max-file: "1"
        max-size: 10m

  mysql:
    image: mysql:8.4.8
    network_mode: host
    ports:
      - 3306:3306
    volumes:
      - mysql-db:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d:cached
    environment:
      MYSQL_USER: epgstation_user
      MYSQL_PASSWORD: epgstation_passwd
      MYSQL_ROOT_PASSWORD: epgstation_root_passwd
      MYSQL_DATABASE: epgstation
      TZ: "Asia/Tokyo"
    restart: always
    logging:
      options:
        max-file: "3"
        max-size: 10m

  epgstation:
    image: ghcr.io/hiroxto/epgstation:latest@sha256:d1cd983a4e879a2e15d4c169fca446ff7b9f8190f935bf64179453929aedf194
    network_mode: host
    ports:
      - 8888:8888
      - 8889:8889
    volumes:
      - ./epgstation/config:/app/config
      - ./epgstation/extra:/extra:cached
      - /mnt/dtv/backup/epgstation:/backup
      - /mnt/dtv/epgstation/data:/app/data
      - /mnt/dtv/epgstation/drop:/app/drop
      - /mnt/dtv/epgstation/thumbnail:/app/thumbnail
      - /mnt/dtv/epgstation/logs:/app/logs
      - /mnt/dtv/epgstation/recorded:/app/recorded
    environment:
      TZ: "Asia/Tokyo"
    depends_on:
      - mysql
    restart: always
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 10m

  navidrome:
    image: deluan/navidrome:0.61.2
    user: 1000:1000 # should be owner of volumes
    ports:
      - 4533:4533
    restart: unless-stopped
    environment:
      TZ: "Asia/Tokyo"
      # Optional: put your config options customization here. Examples:
      # ND_LOGLEVEL: debug
    volumes:
      - ./navidrome/data:/data
      - ./navidrome/extra:/extra:cached
      - /mnt/media1:/music:ro

volumes:
  mysql-db:
    driver: local
